    <main>
        <h2>Get in touch</h2>
        <h4>Have a question or feedback? We'd love to hear from you.</h4>
        <section>
            <form method="post">
                <h3>Feedback Form</h3>
                <label for="name">Name</label>
                <input id="name" type="text" required>
                <br>
                <label for="email">Email</label>
                <input id="email" type="email" required>
                <br>
                <label for="no">Mobile Number</label>
                <input id="no" type="tel" required>
                <br>
                <label for="type">Nature of feedback</label>
                <select id="type">
                    <option>--Select--</option>
                    <option>Complaint related to site</option>
                    <option>Suggestions</option>
                    <option>Book delivery Issue</option>
                </select>
                <br>
                <br>
                <label for="feed">Feedback/Complaint</label>
                <textarea id="feed" type="text" required rows="4">
                </textarea>
                <br>
                <br>
                <br>
                <button>Submit</button>
            </form>
        </section>
        <br>
        <hr>
        <section class="end">
            Contact details
